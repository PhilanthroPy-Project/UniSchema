services:
  unischema:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Dockerfile sets NODE_ENV=production; override it so the default
      # `docker compose up` runs the pilot demo without requiring webhook secrets.
      NODE_ENV: development
      SERVE_FRONTEND: "true"
      EGRESS_TARGET: local
      EGRESS_LOCAL_DIR: /app/data/egress
      DATABASE_URL: /app/data/unischema.db
    volumes:
      # Bind-mount to the host ./data so `npm run demo` and the README quickstart
      # can read the ConstituentEvent egress the container writes.
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
