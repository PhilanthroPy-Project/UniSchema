services:
  unischema:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      SERVE_FRONTEND: "true"
      EGRESS_TARGET: local
      EGRESS_LOCAL_DIR: /app/data/egress
      DATABASE_URL: /app/data/unischema.db
    volumes:
      - unischema-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  unischema-data:
