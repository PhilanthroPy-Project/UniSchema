# Agent Pipeline Validation
#
# Rigorous CI/CD gate for UniSchema. Every push to main and every pull request
# must pass backend typecheck, coverage-backed tests, and frontend validation
# before changes are considered merge-ready.
#
# AUTONOMOUS AGENT INTEGRATION (future):
# If scheduled or PR validation fails (e.g., due to an upstream API change from
# Cvent, GiveCampus, or another vendor breaking our Zod schemas), that failure
# should trigger an autonomous LLM workflow that:
#   1. Inspects the failing test output and the affected vendor payload shape.
#   2. Patches the relevant mapper(s) under `src/mappers/` to restore validation.
#   3. Opens a fix PR with updated mapper logic and passing tests.
#
# Test contracts the agent must satisfy:
#   - tests/unit/mappers.test.ts        — vendor payload → master schema mapping
#   - tests/unit/schema.test.ts         — ConstituentEvent Zod schema invariants
#   - tests/integration/webhooks.test.ts — Hono webhook route integration
#   - tests/unit/security.test.ts       — secret scanning and .gitignore enforcement
#   - frontend/tests/         — visual mapper utility logic

name: Agent Pipeline Validation

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security — secret scan & sensitive path gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository security guard tests
        run: npm run test:security

      - name: Block tracked environment files
        run: |
          if git ls-files | grep -E '(^|/)\.env(\.|$)' | grep -Ev '\.env\.example$'; then
            echo 'Tracked .env files detected. Remove them and use .env.example instead.'
            exit 1
          fi

  backend:
    name: Backend — typecheck, coverage, tests
    runs-on: ubuntu-latest
    needs:
      - security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck backend
        run: npm run typecheck

      - name: Run backend test suite with coverage
        run: npm run test:coverage

  frontend:
    name: Frontend — typecheck, tests, build
    runs-on: ubuntu-latest
    needs:
      - security
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Run frontend test suite
        run: npm run test

      - name: Build frontend for production
        run: npm run build

  e2e:
    name: Frontend — Playwright smoke (bundled UI)
    runs-on: ubuntu-latest
    needs:
      - frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Start server with bundled UI
        env:
          SERVE_FRONTEND: 'true'
          NODE_ENV: development
        run: |
          npm run build
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && break
            sleep 1
          done

      - name: Run Playwright smoke tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npm run test:e2e

  quality-gate:
    name: Quality gate — all checks passed
    runs-on: ubuntu-latest
    needs:
      - security
      - backend
      - frontend
      - e2e

    steps:
      - name: Confirm pipeline success
        run: echo "All UniSchema quality checks passed."
