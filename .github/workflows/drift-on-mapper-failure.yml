# Trigger drift worker when mapper tests fail on main

name: Drift Agent on Mapper Failure

on:
  workflow_run:
    workflows: [Agent Pipeline Validation]
    types: [completed]
    branches: [main]

jobs:
  check-and-run:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run TypeScript drift worker (seed dry-run)
        run: npm run drift-worker -- --dry-run --limit 3 --no-ack

      - name: Validate generated artifacts compile
        run: npm run typecheck

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-worker-mapper-failure
          path: |
            tests/__fixtures__/drift/
            tests/autogenerated/
          if-no-files-found: ignore
