# Trigger drift agent when mapper tests fail on main

name: Drift Agent on Mapper Failure

on:
  workflow_run:
    workflows: [Agent Pipeline Validation]
    types: [completed]
    branches: [main]

jobs:
  check-and-run:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r agents/drift_runner/requirements.txt

      - name: Run drift agent dry-run on mapper failure
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m agents.drift_runner --dry-run --limit 3 --create-pr || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-agent-mapper-failure
          path: |
            agents/output/
            tests/autogenerated/
          if-no-files-found: ignore
