name: Certify vendor
description: Promote a Tier 3 vendor to production-tested with real (redacted) payloads
title: "Certify vendor: "
labels:
  - vendor
  - certification
body:
  - type: markdown
    attributes:
      value: |
        See [docs/vendor-certification.md](https://github.com/PhilanthroPy-Project/UniSchema/blob/main/docs/vendor-certification.md) for the full certification path.

  - type: input
    id: vendor_slug
    attributes:
      label: Vendor slug
      description: e.g. slate, npsp, blackbaud, ellucian
      placeholder: slate
    validations:
      required: true

  - type: dropdown
    id: current_tier
    attributes:
      label: Current tier
      options:
        - "3"
        - "2"
    validations:
      required: true

  - type: textarea
    id: payload_description
    attributes:
      label: Payload description
      description: What webhook type (donation, registration, etc.) and which fields differ from existing fixtures?
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission checklist
      options:
        - label: Redacted real payload attached or linked (no PII)
          required: true
        - label: HMAC header name documented
          required: false
        - label: Willing to open PR with tests under tests/__fixtures__/certified/
          required: false
