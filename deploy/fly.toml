# fly.toml app configuration file generated for UniSchema.
#
# Deploy from repo root:
#   fly launch --no-deploy --config deploy/fly.toml
#   fly volumes create unischema_data --size 1
#   fly secrets set ...  (see deploy/README.md)
#   fly deploy --config deploy/fly.toml

app = 'unischema'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  SERVE_FRONTEND = 'true'
  PORT = '3000'
  DATABASE_URL = '/app/data/unischema.db'
  EGRESS_LOCAL_DIR = '/app/data/egress'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[mounts]]
  source = 'unischema_data'
  destination = '/app/data'

[vm]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
